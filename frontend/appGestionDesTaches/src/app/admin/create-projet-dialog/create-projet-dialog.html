<h2 mat-dialog-title>Ajouter un projet</h2>

<mat-dialog-content>
  <div class="form-container">

    <mat-form-field appearance="outline">
      <mat-label>Titre</mat-label>
      <input
        matInput
        [(ngModel)]="data.titre"
        required
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <input
        matInput
        [(ngModel)]="data.description" 
        required
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date début</mat-label>
      <input
        matInput
        type="date"
        [(ngModel)]="data.dateDebut"
        required
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date fin</mat-label>
      <input
        matInput
        type="date"
        [(ngModel)]="data.dateFin"
        required
      />
    </mat-form-field>


    <mat-form-field appearance="outline">
      <mat-label>Chef de projet</mat-label>
      <mat-select [(ngModel)]="data.chefDeProjetId" required>
        @for ( chef of chefsDeProjet; track $index) {
        <mat-option  [value]="chef.id">
          {{ chef.nom }} {{ chef.prenom }}
        </mat-option>}
      </mat-select>
    </mat-form-field>

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuler</button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSave()"
    [disabled]="!data.titre || !data.chefDeProjetId"
  >
    Créer
  </button>
</mat-dialog-actions>
