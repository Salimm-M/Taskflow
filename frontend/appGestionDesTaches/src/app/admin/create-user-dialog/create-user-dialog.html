<h2 mat-dialog-title>Ajouter un utilisateur</h2>

<mat-dialog-content>
  <form #userForm="ngForm" class="form-container">

    <mat-form-field appearance="outline">
      <mat-label>Nom</mat-label>
      <input
        matInput
        name="nom"
        [(ngModel)]="data.nom"
        #nom="ngModel"
        required
        minlength="2"
        pattern="^[A-Za-zÀ-ÿ ]+$">

      <mat-error *ngIf="nom.touched && nom.invalid">
        Nom invalide
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Prénom</mat-label>
      <input
        matInput
        name="prenom"
        [(ngModel)]="data.prenom"
        #prenom="ngModel"
        required
        minlength="2"
        pattern="^[A-Za-zÀ-ÿ ]+$">

      <mat-error *ngIf="prenom.touched && prenom.invalid">
        Prénom invalide
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input
        matInput
        type="email"
        name="email"
        [(ngModel)]="data.email"
        #email="ngModel"
        required
        email>

      <mat-error *ngIf="email.touched && email.invalid">
        Email invalide
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Téléphone</mat-label>
      <input
        matInput
        name="numTelephone"
        [(ngModel)]="data.numTelephone"
        #numTelephone="ngModel"
        required
        pattern="^[0-9]{8}$">

      <mat-error *ngIf="numTelephone.touched && numTelephone.invalid">
        Numéro invalide
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Adresse</mat-label>
      <input
        matInput
        name="adresse"
        [(ngModel)]="data.adresse"
        #adresse="ngModel"
        required
        minlength="5">

      <mat-error *ngIf="adresse.touched && adresse.invalid">
        Adresse invalide
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mot de passe</mat-label>
      <input
        matInput
        type="password"
        name="motDePasse"
        [(ngModel)]="data.motDePasse"
        #motDePasse="ngModel"
        required
        minlength="8">

      <mat-error *ngIf="motDePasse.touched && motDePasse.invalid">
        Minimum 8 caractères
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Rôle</mat-label>
      <mat-select
        name="role"
        [(ngModel)]="data.role"
        #role="ngModel"
        required>

        @for (r of roles; track $index) {
          <mat-option [value]="r">{{ r }}</mat-option>
        }

      </mat-select>

      <mat-error *ngIf="role.touched && role.invalid">
        Choisir un rôle
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date de naissance</mat-label>
      <input
        matInput
        type="date"
        name="dateDeNaissance"
        [(ngModel)]="data.dateDeNaissance"
        #dateDeNaissance="ngModel"
        required>

      <mat-error *ngIf="dateDeNaissance.touched && dateDeNaissance.invalid">
        Date obligatoire
      </mat-error>

      <mat-error *ngIf="submitted && !isAdult(data.dateDeNaissance)">
        Âge minimum 18 ans
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuler</button>

  <button
    mat-raised-button
    color="primary"
    (click)="onSave(userForm)">
    Enregistrer
  </button>
</mat-dialog-actions>
