  <div class="login-container">
        <div class="login-header">
            <h1>Bienvenue</h1>
            <p>Connectez-vous à votre compte</p>
        </div>

        <form id="loginForm" [formGroup]="monform" (submit)="onSubmit()" >
            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" placeholder="Entrez votre adresse e-mail" formControlName="email" required>
                 @if(monform.controls['email'].invalid&& (monform.controls['email'].dirty || monform.controls['email'].touched)){
                
                <span class="text-danger">email invalid</span>
              }
            </div>

            <div class="form-group">
                <label for="password">mot de passe</label>
                <input [type]="visible?'text':'password'" id="password" placeholder="Entrez votre mot de passe" #mtp formControlName="password" required>
                <span class="password-toggle" (click)="afficher()" >👁️</span>
            @if (  errorMessage) {
                <div class="alert alert-danger" role="alert">
  {{this.errorMessage}}
</div>
            }
            </div>

           

            <button type="submit" class="login-btn">connexion</button>
        </form>

     
    </div>
