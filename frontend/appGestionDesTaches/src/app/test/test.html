<div class="tree-container">
  <mat-tree [dataSource]="dataSource" [treeControl]="treeControl">

    <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
      <div class="mat-tree-node parent-node">
        <button mat-icon-button (click)="onToggle(node)" matTreeNodeToggle class="expand-btn">
          <mat-icon class="expand-icon">
            {{ treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
          </mat-icon>
        </button>
        <div class="node-content">
          <mat-icon class="node-icon">folder</mat-icon>
          <span class="node-name">{{ node.name }}</span>
          <span class="status-badge" [attr.data-status]="node.status?.toLowerCase()" *ngIf="node.status">
            {{ node.status }}
          </span>
        </div>
      </div>
      <ng-container matTreeNodeOutlet></ng-container>
    </mat-nested-tree-node>

 
    <mat-nested-tree-node *matTreeNodeDef="let node">
      <div class="mat-tree-node child-node">
        <div class="spacer"></div>
        <div class="node-content">
          <mat-icon class="node-icon">description</mat-icon>
          <span class="node-name">{{ node.name }}</span>
          <span class="status-badge" [attr.data-status]="node.status?.toLowerCase()" *ngIf="node.status">
            {{ node.status }}
          </span>
        </div>
      </div>
    </mat-nested-tree-node>
  </mat-tree>
</div>
